<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT4FUN - Mail</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f6f8fc;
    --sidebar-bg: #f6f8fc;
    --white: #ffffff;
    --surface: #ffffff;
    --border: #e0e0e0;
    --primary: #1a73e8;
    --primary-hover: #1765cc;
    --primary-light: #e8f0fe;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --text-hint: #9aa0a6;
    --unread-bg: #ffffff;
    --read-bg: #f2f6fc;
    --hover-bg: #f2f6fc;
    --avatar-bg: #1a73e8;
    --chip-bg: #e8f0fe;
    --chip-text: #1a73e8;
    --shadow-sm: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
    --shadow-md: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-full: 999px;
    --font-sans: 'Google Sans', 'Roboto', sans-serif;
    --font-body: 'Roboto', sans-serif;
    --topbar-h: 64px;
    --sidebar-w: 256px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--topbar-h);
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  .topbar-logo {
    display: flex; align-items: center; gap: 8px;
    min-width: 200px;
    font-family: var(--font-sans);
    font-size: 22px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: -.5px;
  }
  .topbar-logo svg { flex-shrink: 0; }
  .topbar-logo span { color: var(--text-primary); }

  .search-bar {
    flex: 1; max-width: 720px; margin: 0 auto;
    display: flex; align-items: center; gap: 12px;
    height: 46px; padding: 0 16px;
    background: #eaf1fb;
    border-radius: var(--radius-full);
    border: none; outline: none;
    transition: background .2s, box-shadow .2s;
    cursor: text;
  }
  .search-bar:focus-within {
    background: var(--white);
    box-shadow: var(--shadow-sm);
  }
  .search-bar svg { color: var(--text-secondary); flex-shrink: 0; }
  .search-input {
    flex: 1; border: none; background: transparent;
    font-family: var(--font-sans); font-size: 16px;
    color: var(--text-primary); outline: none;
  }
  .search-input::placeholder { color: var(--text-hint); }

  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 4px;
  }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer;
    color: var(--text-secondary);
    transition: background .15s;
  }
  .icon-btn:hover { background: var(--hover-bg); }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--avatar-bg);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); font-weight: 500;
    font-size: 14px; color: white; cursor: pointer;
    flex-shrink: 0;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    height: 100vh;
    padding-top: var(--topbar-h);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    padding: 8px 0 16px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 2px;
  }

  .compose-btn {
    display: flex; align-items: center; gap: 12px;
    margin: 8px 12px 16px;
    padding: 16px 24px;
    background: var(--white);
    border: none; border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    color: var(--text-primary);
    transition: box-shadow .2s, background .15s;
  }
  .compose-btn:hover { box-shadow: var(--shadow-md); background: #fafcff; }
  .compose-btn svg { color: var(--text-primary); }

  .nav-item {
    display: flex; align-items: center; gap: 16px;
    padding: 0 16px;
    height: 32px;
    border-radius: 0 var(--radius-full) var(--radius-full) 0;
    margin-right: 16px;
    cursor: pointer;
    font-family: var(--font-body); font-size: 14px;
    color: var(--text-primary);
    transition: background .15s;
    user-select: none;
  }
  .nav-item:hover { background: var(--hover-bg); }
  .nav-item.active {
    background: var(--primary-light);
    font-weight: 700;
    color: var(--text-primary);
  }
  .nav-item svg { flex-shrink: 0; color: var(--text-secondary); }
  .nav-item.active svg { color: var(--text-primary); }
  .nav-item .badge {
    margin-left: auto;
    font-size: 12px; font-weight: 500;
    color: var(--text-primary);
  }

  .nav-section {
    margin: 8px 0 4px 16px;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .8px;
    color: var(--text-hint);
  }

  /* ── MAIN PANEL ── */
  .main {
    flex: 1;
    display: flex; flex-direction: column;
    min-width: 0;
    padding: 8px 24px 0 16px;
  }

  .toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .toolbar-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  /* ── MAIL THREAD ── */
  .thread-container {
    flex: 1; overflow-y: auto;
    padding: 0 0 120px;
  }

  .mail-row {
    display: flex; align-items: center; gap: 0;
    height: 52px; padding: 0 8px;
    border-bottom: 1px solid transparent;
    cursor: pointer;
    position: relative;
    border-radius: var(--radius-sm);
    margin: 1px 0;
    transition: box-shadow .1s, background .1s;
  }
  .mail-row.unread { background: var(--unread-bg); }
  .mail-row.read { background: var(--read-bg); }
  .mail-row:hover { box-shadow: var(--shadow-sm); background: var(--white) !important; z-index: 1; }

  .mail-check {
    width: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .mail-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); font-weight: 500;
    font-size: 13px; color: white;
    flex-shrink: 0; margin-right: 12px;
  }
  .mail-star { width: 24px; flex-shrink: 0; color: var(--text-hint); margin-right: 4px; }

  .mail-from {
    width: 180px; flex-shrink: 0;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-right: 8px;
  }
  .mail-row.read .mail-from { font-weight: 400; color: var(--text-secondary); }

  .mail-snippet {
    flex: 1; min-width: 0;
    font-size: 14px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mail-snippet strong {
    color: var(--text-primary); font-weight: 500;
  }
  .mail-row.read .mail-snippet strong { color: var(--text-secondary); font-weight: 400; }

  .mail-time {
    flex-shrink: 0; margin-left: 16px;
    font-size: 12px;
    color: var(--text-hint);
  }
  .mail-row.unread .mail-time { font-weight: 500; color: var(--text-primary); }

  /* YOU row */
  .mail-row.you-row { background: #fafcff; }
  .mail-row.you-row .mail-from { color: var(--text-secondary); }

  /* ── COMPOSE DRAWER ── */
  .compose-drawer {
    position: fixed;
    bottom: 0; right: 24px;
    width: 520px;
    background: var(--white);
    border-radius: 12px 12px 0 0;
    box-shadow: 0 8px 10px 1px rgba(0,0,0,.14), 0 3px 14px 2px rgba(0,0,0,.12), 0 5px 5px -3px rgba(0,0,0,.2);
    display: flex; flex-direction: column;
    z-index: 200;
    transform: translateY(0);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .compose-header {
    display: flex; align-items: center;
    padding: 8px 16px;
    background: #404040;
    border-radius: 12px 12px 0 0;
    cursor: pointer;
    user-select: none;
  }
  .compose-header-title {
    font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    color: white; flex: 1;
  }
  .compose-header-actions { display: flex; gap: 4px; }
  .compose-header-btn {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer; color: white;
    transition: background .15s;
  }
  .compose-header-btn:hover { background: rgba(255,255,255,.15); }

  .compose-field {
    display: flex; align-items: center;
    padding: 4px 16px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .compose-label {
    font-size: 12px; color: var(--text-secondary);
    min-width: 24px; flex-shrink: 0;
  }
  .compose-input {
    flex: 1; border: none; outline: none;
    font-family: var(--font-body); font-size: 14px;
    color: var(--text-primary); padding: 8px 0;
    background: transparent;
  }
  .compose-input::placeholder { color: var(--text-hint); }

  .compose-body-wrap { flex: 1; padding: 8px 16px; min-height: 160px; }
  .compose-body {
    width: 100%; border: none; outline: none; resize: none;
    font-family: var(--font-body); font-size: 14px;
    color: var(--text-primary); line-height: 1.6;
    min-height: 140px; background: transparent;
  }

  .compose-footer {
    display: flex; align-items: center;
    padding: 8px 12px;
    gap: 4px;
  }
  .send-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px;
    background: var(--primary);
    color: white; border: none; border-radius: var(--radius-full);
    font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
  }
  .send-btn:hover { background: var(--primary-hover); box-shadow: var(--shadow-sm); }
  .send-btn:active { transform: scale(.98); }

  /* ── DETAIL VIEW ── */
  .detail-overlay {
    position: fixed; inset: var(--topbar-h) 0 0 0;
    background: var(--white);
    z-index: 50;
    overflow-y: auto;
    padding: 24px 56px;
    display: none;
    animation: slideUp .2s ease;
  }
  .detail-overlay.open { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .detail-subject {
    font-family: var(--font-sans); font-size: 26px; font-weight: 400;
    color: var(--text-primary); margin-bottom: 24px;
  }
  .detail-header {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 24px;
  }
  .detail-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); font-weight: 500;
    font-size: 16px; color: white;
  }
  .detail-meta { flex: 1; }
  .detail-name { font-family: var(--font-sans); font-weight: 500; font-size: 14px; }
  .detail-addr { font-size: 12px; color: var(--text-secondary); }
  .detail-time { font-size: 12px; color: var(--text-secondary); margin-left: auto; padding-top: 2px; }
  .detail-body {
    font-size: 14px; line-height: 1.8;
    color: var(--text-primary);
    padding-bottom: 32px;
    white-space: pre-wrap;
  }
  .detail-chip {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: var(--radius-full);
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 11px; font-weight: 500;
    margin-bottom: 12px;
  }

  .back-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px; border-radius: var(--radius-full);
    border: none; background: transparent; cursor: pointer;
    color: var(--text-secondary); font-size: 14px;
    margin-bottom: 16px;
    transition: background .15s;
  }
  .back-btn:hover { background: var(--hover-bg); }

  /* ── NOTIFICATION TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #323232; color: white;
    padding: 12px 20px; border-radius: var(--radius-sm);
    font-size: 14px; font-family: var(--font-body);
    transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s;
    opacity: 0; pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 3px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    padding: 64px 0; color: var(--text-hint);
    font-size: 14px; gap: 12px;
  }
  .empty-state svg { opacity: .3; }

  /* ── AVATAR COLORS ── */
  .av-blue    { background: #1a73e8; }
  .av-red     { background: #d93025; }
  .av-green   { background: #188038; }
  .av-orange  { background: #e8710a; }
  .av-purple  { background: #8430ce; }
  .av-teal    { background: #007b83; }
  .av-gray    { background: #5f6368; }
  .av-you     { background: #5f6368; }

  /* hover actions on mail row */
  .mail-actions {
    display: none; align-items: center; gap: 2px;
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: inherit;
  }
  .mail-row:hover .mail-actions { display: flex; }
  .mail-row:hover .mail-time { display: none; }
  .row-action-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: transparent; cursor: pointer;
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .row-action-btn:hover { background: rgba(0,0,0,.08); }

  /* Divider */
  .nav-divider { height: 1px; background: var(--border); margin: 8px 16px; }

  /* ── HAMBURGER (mobile only) ── */
  .hamburger {
    display: none;
    width: 40px; height: 40px; border-radius: 50%;
    align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer;
    color: var(--text-secondary);
    flex-shrink: 0;
    transition: background .15s;
  }
  .hamburger:hover { background: var(--hover-bg); }

  /* ── FAB compose (mobile only) ── */
  .fab-compose {
    display: none;
    position: fixed; bottom: 24px; right: 20px;
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--primary-light);
    border: none; cursor: pointer;
    align-items: center; justify-content: center;
    box-shadow: var(--shadow-md);
    z-index: 150;
    color: var(--primary);
    transition: transform .15s, box-shadow .15s;
  }
  .fab-compose:active { transform: scale(.94); }

  /* ── SIDEBAR OVERLAY (mobile) ── */
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 299;
    opacity: 0;
    transition: opacity .25s;
  }
  .sidebar-overlay.open { display: block; opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    :root { --topbar-h: 56px; --sidebar-w: 280px; }

    .topbar { padding: 0 8px; gap: 4px; }
    .hamburger { display: flex; }
    .topbar-logo { min-width: unset; font-size: 18px; }
    .topbar-logo svg { width: 30px; height: 21px; }
    .search-bar { display: none; }
    .topbar-right .icon-btn { display: none; }

    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 300;
      background: var(--white);
      width: var(--sidebar-w);
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      padding-top: calc(var(--topbar-h) + 8px);
      box-shadow: var(--shadow-md);
    }
    .sidebar.open { transform: translateX(0); }

    .main { padding: 8px 8px 0; }

    .mail-check { width: 12px; }
    .mail-star { display: none; }
    .mail-from { width: 120px; font-size: 13px; }
    .mail-snippet { font-size: 13px; }
    .mail-actions { display: none !important; }
    .mail-row:hover .mail-time { display: flex; }

    .toolbar-sep { display: none; }
    #countLabel { display: none; }

    .detail-overlay { padding: 16px; }
    .detail-subject { font-size: 20px; }

    .compose-drawer { right: 0; left: 0; width: 100%; border-radius: 16px 16px 0 0; }
    .compose-body-wrap { min-height: 120px; }
    .compose-body { min-height: 100px; }

    .fab-compose { display: flex; }
    .compose-btn { display: none; }
  }

  @media (max-width: 480px) {
    .mail-from { width: 95px; font-size: 12px; }
    .mail-snippet { font-size: 12px; }
    .topbar-logo span { font-size: 15px; }
    .detail-overlay { padding: 12px; }
    .detail-subject { font-size: 18px; }
  }
</style>
</head>

    </button>
    <button class="icon-btn" title="Applications Google">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
    <div class="avatar">O</div>

</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR OVERLAY -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">

    <div class="nav-item active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H4.99c-1.11 0-1.98.89-1.98 2L3 19c0 1.1.88 2 1.99 2H19c1.1 0 2-.9 2-2V5c0-1.11-.9-2-2-2zm0 12h-4c0 1.66-1.35 3-3 3s-3-1.34-3-3H4.99V5H19v10z"/></svg>

  <!-- MAIN -->
  <main class="main">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="icon-btn" title="Sélectionner tout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>

      </button>
      <div class="toolbar-sep"></div>
      <button class="icon-btn" title="Plus d'options">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>

    <!-- Thread list -->

</div>

<!-- DETAIL VIEW -->
<div class="detail-overlay" id="detailView">
  <button class="back-btn" id="backBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>

<!-- COMPOSE DRAWER -->
<div class="compose-drawer" id="composeDrawer" style="display:none;">
  <div class="compose-header" id="composeToggle">
    <span class="compose-header-title">Nouveau message</span>
    <div class="compose-header-actions">
      <button class="compose-header-btn" id="minimizeBtn" title="Réduire">

      </button>
      <button class="compose-header-btn" id="closeCompose" title="Fermer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>

  </div>
  <div id="composeBody">
    <div class="compose-field">
      <span class="compose-label">À</span>
      <input class="compose-input" id="to" placeholder="" />
    </div>
    <div class="compose-field">
      <span class="compose-label">Objet</span>
      <input class="compose-input" id="subject" placeholder="" />
    </div>
    <div class="compose-body-wrap">
      <textarea class="compose-body" id="message" placeholder=""></textarea>
    </div>
    <div class="compose-footer">
      <button class="send-btn" onclick="sendMail()">
        Envoyer
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button class="icon-btn" title="Mise en forme" style="margin-left:4px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 5v3h5v12h3V8h5V5z"/></svg>
      </button>
      <button class="icon-btn" title="Joindre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
      </button>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      </button>
      <button class="icon-btn" style="margin-left:auto;" title="Supprimer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>

</div>

<!-- FAB COMPOSE (mobile) -->
<button class="fab-compose" id="fabCompose" aria-label="Nouveau message">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

<script>
// ── STATE ──
const SECRET_EMAIL = "m.dubosq13@gmail.com";
let step = parseInt(localStorage.getItem("step") || "0");
let history = JSON.parse(localStorage.getItem("history") || "[]");
let minimized = false;

const avatarColors = ['av-blue','av-red','av-green','av-orange','av-purple','av-teal'];
const senderColors = {};

function getSenderColor(name) {
  if (!senderColors[name]) {
    const idx = Object.keys(senderColors).length % avatarColors.length;
    senderColors[name] = avatarColors[idx];
  }
  return senderColors[name];
}

function normalize(t) { return t.toLowerCase(); }
function contains(t, kws) { return kws.some(k => t.includes(k)); }

function getTime() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function save() {
  localStorage.setItem("step", step);
  localStorage.setItem("history", JSON.stringify(history));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function updateBadge() {
  const unread = history.filter(m => !m.read && m.from !== "Vous").length;
  const badge = document.getElementById("unreadBadge");
  const count = document.getElementById("countLabel");
  badge.textContent = unread || "";
  badge.style.display = unread ? "" : "none";
  count.textContent = `1–${history.length} sur ${history.length}`;
}

// ── RENDER INBOX ──
function render() {
  const inbox = document.getElementById("inbox");

  if (history.length === 0) {
    inbox.innerHTML = `<div class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
      <span>Aucun message.</strong>.</span>
    </div>`;
    updateBadge();
    return;
  }

  inbox.innerHTML = "";
  [...history].reverse().forEach((mail, ri) => {
    const i = history.length - 1 - ri;
    const isYou = mail.from === "Vous";
    const isSystem = mail.from === "Système";
    const isUnread = !mail.read && !isYou;
    const initial = mail.from[0].toUpperCase();
    const colorClass = isYou ? "av-you" : (isSystem ? "av-gray" : getSenderColor(mail.from));
    const snippet = mail.text.replace(/\n/g, " ").slice(0, 80) + (mail.text.length > 80 ? "…" : "");

    const row = document.createElement("div");
    row.className = `mail-row ${isUnread ? "unread" : "read"} ${isYou ? "you-row" : ""}`;
    row.innerHTML = `
      <div class="mail-check">
        <button class="row-action-btn" title="Sélectionner" style="display:flex">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
        </button>
      </div>
      <div class="mail-avatar ${colorClass}">${initial}</div>
      <div class="mail-star">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg>
      </div>
      <div class="mail-from">${mail.from}</div>
      <div class="mail-snippet"><strong>${snippet}</strong></div>
      <div class="mail-time">${mail.time}</div>
      <div class="mail-actions">
        <button class="row-action-btn" title="Archiver"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM6.24 5h11.52l.83 1H5.42l.82-1zM5 19V8h14v11H5zm8.45-9h-2.9v3H8l4 4 4-4h-2.55z"/></svg></button>
        <button class="row-action-btn" title="Supprimer"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
        <button class="row-action-btn" title="Lire plus tard"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg></button>
      </div>
    `;
    row.addEventListener("click", (e) => {
      if (e.target.closest(".row-action-btn")) return;
      openDetail(i);
    });
    inbox.appendChild(row);
  });

  updateBadge();
}

// ── DETAIL VIEW ──
function openDetail(idx) {
  const mail = history[idx];
  mail.read = true;
  save(); render();

  const colorClass = mail.from === "Vous" ? "av-you" : (mail.from === "Système" ? "av-gray" : getSenderColor(mail.from));
  const initial = mail.from[0].toUpperCase();
  const isSystem = mail.from === "Système";
  const isYou = mail.from === "Vous";

  document.getElementById("detailContent").innerHTML = `
    ${isSystem ? '<span class="detail-chip">⚙ Notification système</span>' : ""}
    ${isYou ? '<span class="detail-chip">📤 Message envoyé</span>' : ""}
    <div class="detail-subject">${isYou ? "Message envoyé" : `Message de ${mail.from}`}</div>
    <div class="detail-header">
      <div class="detail-avatar ${colorClass}">${initial}</div>
      <div class="detail-meta">
        <div class="detail-name">${mail.from}</div>
        <div class="detail-addr">${isYou ? "moi" : "m.dubosq13@gmail.com"}</div>
      </div>
      <div class="detail-time">${mail.time}</div>
    </div>
    <div class="detail-body">${escapeHtml(mail.text)}</div>
  `;

  document.getElementById("detailView").classList.add("open");
}

document.getElementById("backBtn").addEventListener("click", () => {
  document.getElementById("detailView").classList.remove("open");
});

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── COMPOSE ──
document.getElementById("openCompose").addEventListener("click", () => {
  const drawer = document.getElementById("composeDrawer");
  drawer.style.display = "flex";
  drawer.style.flexDirection = "column";
  minimized = false;
  document.getElementById("composeBody").style.display = "";
  document.getElementById("to").focus();
});

document.getElementById("closeCompose").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("composeDrawer").style.display = "none";
});

document.getElementById("minimizeBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  minimized = !minimized;
  document.getElementById("composeBody").style.display = minimized ? "none" : "";
});

document.getElementById("composeToggle").addEventListener("click", () => {
  if (!minimized) return;
  minimized = false;
  document.getElementById("composeBody").style.display = "";
});

// ── SEND LOGIC ──
function wrongEmailReply() {
  const replies = [
    "Aucune réponse de cette adresse.",
    "Adresse inconnue.",
    "Le message n'a pas été distribué.",
    "…Silence radio.",
    "Personne ne semble répondre."
  ];
  return replies[Math.floor(Math.random() * replies.length)];
}

function sendMail() {
  const to = document.getElementById("to").value.trim().toLowerCase();
  const msg = normalize(document.getElementById("message").value.trim());

  if (!msg) return;

  history.push({ from: "Vous", text: msg, time: getTime(), read: true });

  if (to !== SECRET_EMAIL) {
    setTimeout(() => {
      history.push({ from: "Système", text: wrongEmailReply(), time: getTime(), read: false });
      save(); render();
      showToast("Message non distribué");
    }, 700);
    save(); render();
    document.getElementById("message").value = "";
    return;
  }

  let response = "";

  if (step === 0 && contains(msg, ["recette", "cocktail"])) {
    step = 1;
    response = "Oh vous savez, ma mémoire flanche depuis quelques années… Je ne suis pas sûre de me souvenir… C'était quand déjà ?";
  } else if (step === 1 && contains(msg, ["23 mai 2022", "23 05 2022"])) {
    step = 2;
    response = "Cette date… POURQUOI VOUS ME PARLEZ DE CETTE DATE ?! Si vous saviez comme je m'en veux…";
  } else if (step === 2 && !contains(msg, ["recette","cocktail","23 mai 2022","23 05 2022","concours goudes","cri ultime","cris ultime","crustacés","crustaces"])) {
    step = 3;
    response = "Je m'en veux… Ça n'aurait pas dû se passer comme ça… Enfin bon, à quelle occasion j’ai créé un cocktail?";
  } else if (step === 3 && contains(msg, ["concours goudes"])) {
    step = 4;
    response = "Vous voulez la recette de mon cocktail c'est ça ? Un cocktail… Quel cocktail ? Quel était son nom ?";
  } else if (step === 4 && contains(msg, ["cri ultime", "cris ultime"])) {
    step = 5;
    response = `AAAAH OUI ! Le fameux Cri ultime !
    D'accord, je veux bien vous donner la recette de mon cocktail, mais seulement si vous faites quelque chose pour moi...

    Vous savez, je commence a perdre la memoire... L'age, vous savez... Enfin bon, j'aimerais me souvenir de ce que j'ai mange ce jour-la. J'etais dans un restaurant dans mon village... C'etait un plat a 30 euros... Non, 29 euros exactement ! C'etait assez special, des crustacés, je crois...

    Enfin bon, si je vous donne la recette du cocktail, pourriez-vous m'aider a retrouver le plat que j'ai mange ce jour-la ?

    Si oui, envoyez : crustacés`;
  } else if (step === 5 && contains(msg, ["crustacés", "crustaces"])) {
    step = 6;
    response = "Super, alors pour la recette…\n\n" +
               "2 shots de Ricard\n" +
               "1/4 de citron\n" +
               "2 c.a.c de sucre de canne\n" +
               "2 c.a.c de gingembre\n" +
               "25 cl de jus d'orange\n\n" +
               "Et pour ma petite touche personnelle, je rajoute toujours un fond de grenadine !";
    // Removed the rogue brace and quotes here
  } else if (step === 2 && contains(msg, ["recette","cocktail","23 mai 2022"])) {
    // ... rest of your code";
  } else if (step === 2 && contains(msg, ["recette","cocktail","23 mai 2022","23 05 2022","concours goudes","cri ultime","cris ultime","crustacés","crustaces"])) {
    response = "Je… je ne sais plus. Vous savez, tout ça m'a tellement marquée. Dites-moi juste ce qui vous a amené à moi.";
  } else {
    response = "…Je ne comprends pas très bien…";
  }

  setTimeout(() => {
    history.push({ from: "Muriel Dubosq", text: response, time: getTime(), read: false });
    try { document.getElementById("notifSound").play(); } catch(e) {}
    save(); render();
    showToast("Nouveau message de Muriel Dubosq");
  }, 900);

  save(); render();
  document.getElementById("message").value = "";
  document.getElementById("composeDrawer").style.display = "none";
}

// Allow Ctrl+Enter to send
document.getElementById("message").addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") sendMail();
});

// Initial render
getSenderColor("Muriel Dubosq"); // pre-assign blue
render();

// ── MOBILE NAVIGATION ──
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("sidebarOverlay");
const hamburger = document.getElementById("hamburgerBtn");
const fabCompose = document.getElementById("fabCompose");

function openSidebar() {
  sidebar.classList.add("open");
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("open");
  document.body.style.overflow = "";
}

hamburger.addEventListener("click", () => {
  sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
});
overlay.addEventListener("click", closeSidebar);

sidebar.querySelectorAll(".nav-item").forEach(item => {
  item.addEventListener("click", () => {
    if (window.innerWidth <= 768) closeSidebar();
  });
});

fabCompose.addEventListener("click", () => {
  const drawer = document.getElementById("composeDrawer");
  drawer.style.display = "flex";
  drawer.style.flexDirection = "column";
  minimized = false;
  document.getElementById("composeBody").style.display = "";
  document.getElementById("to").focus();
});
